# Render blueprint — KetdikGo Telegram bot (long-polling Background Worker)
# Maxfiy kalitlar Render dashboard'da to'ldiriladi (sync:false).
#
# Bot repo ILDIZIDA (root). Render Background Worker:
#   Build Command : npm ci
#   Start Command : npm start   ← faqat Node.js botni ishga tushiradi (Python EMAS)
# Eski Python bot `eski_python/` papkasida saqlangan (ishlamaydi, deploy qilinmaydi).
services:
  - type: worker
    name: ketdikgo-bot
    runtime: node
    plan: starter
    buildCommand: npm ci
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      # @BotFather'dan olingan token (MAJBURIY)
      - key: BOT_TOKEN
        sync: false
      # Ixtiyoriy — bo'lmasa config.js standart qiymati ishlatiladi
      - key: PLAY_STORE_URL
        sync: false
      - key: APP_STORE_URL
        sync: false
      - key: DISPATCHER_PHONE
        sync: false
